apiVersion: batch/v1
kind: Job
metadata:
  name: playwright-worker
  namespace: playwright-test
spec:
  completions: 4
  parallelism: 4
  template:
    spec:
      volumes:
        - name: queue
          emptyDir: {}      
      containers:
        - name: playwright
          image: ghcr.io/thanhtrungtran-testautomation/portfolio-playwright/app:latest
          volumeMounts:
            - name: queue
              mountPath: /queue          
          # Environment Variables für URLs
          env:
            - name: PLAYWRIGHT_baseUrl
              value: "http://localhost:3000"   # Base URL für Tests
            - name: HOME
              value: "/root"
            - name: JOB_COMPLETION_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']           
          command:
            - sh
            - -c
            - |
              echo "Runner index: $JOB_COMPLETION_INDEX"
              #echo "Pod index: $HOSTNAME"
              npm ci
              # App im Hintergrund starten
              node demo-app/server.js &
              # Warten bis App auf localhost:3000 bereit ist
              npx wait-on http://localhost:3000
              echo "Running tests on pod: $HOSTNAME"              
              INDEX=${JOB_COMPLETION_INDEX}
              TOTAL=4

              SHARD=$((INDEX+1))

              echo "Running shard $SHARD of $TOTAL"

              npx playwright test --shard=$SHARD/$TOTAL                  

      restartPolicy: Never
  backoffLimit: 1